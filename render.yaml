# Render Blueprint - DHS Hybrid Plugin Platform
# Deploy: Connect this repo to Render → New → Blueprint
# Single web service: https://<edhs-webservice>.onrender.com

services:
  # Single web service: API + Streamlit dashboard (one container)
  - type: web
    runtime: docker
    name: edhs-webservice
    dockerfilePath: ./Dockerfile.webservice
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: TEMP_DATA_DIR
        value: /tmp/edhs_core_sessions
      - key: SESSION_TTL_SECONDS
        value: "3600"
      - key: DHS_PROGRAM_API_KEY
        sync: false  # Add your key from https://api.dhsprogram.com/
      - key: BACKEND_CORS_ORIGINS
        sync: false  # Add your dashboard URL after deploy (e.g. https://edhs-webservice-xxx.onrender.com)
