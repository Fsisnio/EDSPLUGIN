# Render Blueprint - DHS Hybrid Plugin Platform
# Deploy: Connect this repo to Render → New → Blueprint
# Single web service: https://<edhs-webservice>.onrender.com
#
# Requires Docker (below): FastAPI listens on :8000 inside the container; Streamlit on $PORT.
# A "native" Python web service that only runs `streamlit run` has NO API on 8000 — use this blueprint or run_webservice.sh.
# Do not set EDHS_SHOW_BACKEND_CONNECTION in production (it forces the Backend connection form on every user).

services:
  # Single web service: API + Streamlit dashboard (one container)
  - type: web
    runtime: docker
    name: edhs-webservice
    dockerfilePath: ./Dockerfile.webservice
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: TEMP_DATA_DIR
        value: /tmp/edhs_core_sessions
      - key: SESSION_TTL_SECONDS
        value: "3600"
      - key: DHS_PROGRAM_API_KEY
        sync: false  # Add your key from https://api.dhsprogram.com/
      - key: BACKEND_CORS_ORIGINS
        sync: false  # Add your dashboard URL after deploy (e.g. https://edhs-webservice-xxx.onrender.com)
      # Streamlit → same-container API (see scripts/run_webservice.sh)
      - key: API_BASE_URL
        value: http://127.0.0.1:8000/api/v1
      - key: EDHS_HIDE_BACKEND_CONNECTION
        value: "true"
      # Remove EDHS_SHOW_BACKEND_CONNECTION if present — "true" keeps the sidebar form visible.
      # Optional: EDHS_HEALTHCHECK_TIMEOUT=15 (seconds) if first-load health check is slow after deploy.
      # Optional: DHS_AUTO_FETCH=true  DHS_AUTO_COUNTRIES=SEN,KEN  DHS_AUTO_INDICATORS=FE_FRTR_W_TFR,CM_ECMR_C_IMR
